<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en' }}">
{% include head.html %}
<body class="layout-{{ page.layout | default: 'default' }}{% if page.image and page.layout != 'post' %} has-page-image{% endif %}{% if page.url == '/' %} home-landing{% endif %}">
<a class="skip-link" href="#main-content">Skip to main content</a>
<aside class="menu-drawer" id="site-drawer" aria-hidden="true" role="dialog" aria-modal="true" aria-label="Site menu">
  <div class="menu-drawer__inner">
    {% include sidebar.html %}
  </div>
</aside>
<div class="menu-backdrop" data-menu-close></div>
<div class="site-shell" data-site-shell>
  {% include header.html %}
  {% if page.image and page.layout != 'post' %}
    <section class="page-header-image">
      <div class="page-header-image__media" style="background-image: url('{{ page.image | relative_url }}');"></div>
      <div class="container page-header-image__content">
        <h1 class="page-header-image__title">{{ page.title }}</h1>
      </div>
    </section>
  {% endif %}
  <main class="page-content" id="main-content" aria-label="Content" tabindex="-1">
    {{ content }}
  </main>
  {% include footer.html %}
</div>
{% include script.html %}
</body>
</html>
