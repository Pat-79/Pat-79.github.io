lang: en
title: Away From Home
description: A content site using a reusable custom Jekyll theme.
url: ""
baseurl: ""
permalink: pretty
theme: awayfromhome-theme
default_post_image: /assets/images/post-hero-philippines.svg

brand:
  title: awayfromhome.nl
  logo: /assets/images/logo-mark.svg

author:
  name: Patrick
  avatar: /assets/images/avatar.svg
  bio: Slow travel notes, practical route ideas, and visual field journals from the road.
  location: Based in the Netherlands, usually somewhere else.

navigation:
  - title: Home
    url: /
  - title: About
    url: /about/
  - title: Blogs
    url: /blog/
  - title: Social Media
    url: /social-media/

archives:
  - title: April 2026
    url: /archive/2026/04/
  - title: March 2026
    url: /archive/2026/03/
  - title: February 2026
    url: /archive/2026/02/

social_links:
  - platform: instagram
    url: https://www.instagram.com/awayfromhome_nl/
  - platform: youtube
    url: https://www.youtube.com/@-Away-From-Home-/videos
  - platform: github
    url: https://github.com/Pat-79

social_page:
  intro: Use this page for the site-specific social channels that sit behind the shared theme.
  open_new_tab: true

footer:
  domain_label: awayfromhome.nl
  sitemap_url: /sitemap/
  copyright: All rights reserved.
  disclaimer: Travel information and opinions may change over time; verify critical details independently.

theme_settings:
  default_theme: auto

exclude:
  - theme

sass:
  sass_dir: _sass
  style: compressed

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      author: Patrick
  - scope:
      path: ""
    values:
      layout: default